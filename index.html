function renderConcerts(filter) {
  const grid = document.getElementById('concertGrid');
  grid.innerHTML = '';
  const list = filter === 'all' ? concerts : concerts.filter(c => c.theme === filter);
  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'concert-card';
    card.dataset.id = i;
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this)">
        <div class="concert-image">
          <img src="${c.img}" alt="${c.imgAlt}" loading="lazy" onerror="this.parentElement.style.display='none'">
        </div>
        <div class="concert-number">${c.num}</div>
        <div class="card-content">
          <div class="theme-tag tag-${c.theme}">${c.theme}</div>
          <div class="concert-title">${c.title}</div>
          <div class="concert-date">${c.date}</div>
        </div>
        <div class="chevron" id="chev-${i}">&#9660;</div>
      </div>
      <div class="program-copy" id="copy-${i}">${c.copy}
        <div class="repertoire">
          ${c.rep.map(r=>`<div class="rep-item"><span>${r.c}</span>${r.w}</div>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleCard(header) {
  const card = header.closest('.concert-card');
  const idx = card.dataset.id;
  const copy = document.getElementById('copy-' + idx);
  const chev = document.getElementById('chev-' + idx);
  const isOpen = copy.classList.contains('open');
  document.querySelectorAll('.program-copy').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(el => el.classList.remove('open'));
  if (!isOpen) { copy.classList.add('open'); chev.classList.add('open'); }
}

function filterConcerts(theme, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderConcerts(theme);
}

renderConcerts('all');
