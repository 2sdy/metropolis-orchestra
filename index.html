    copy: "Wagner said that music expresses the inexpressible. These three works test that idea with some of the most emotionally overwhelming pages ever written. The Prelude to Tristan und Isolde distills centuries of longing into eighteen minutes of suspended desire. Ravel's La Valse transforms a ballroom into something hallucinatory, a dance of love and dissolution. At the centre of the evening, soprano Elena Voss joins the orchestra for Richard Strauss's Four Last Songs — four farewells so exquisite they make the air feel different. Come ready to feel too much.",

function renderConcerts(filter) {
  const grid = document.getElementById('concertGrid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? concerts : concerts.filter(c => c.theme === filter);
  filtered.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'concert-card';
    card.dataset.id = i;
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this)">
        <div class="concert-number">${c.num}</div>
        <div class="card-content">
          <div class="theme-tag tag-${c.theme}">${c.theme}</div>
          <div class="concert-title">${c.title}</div>
          <div class="concert-date">${c.date}</div>
        </div>
        <div class="chevron" id="chev-${i}">&#9660;</div>
      </div>
      <div class="program-copy" id="copy-${i}">${c.copy}
        <div class="repertoire open" id="rep-${i}">
          ${c.rep.map(r => `<div class="rep-item"><span>${r.composer}</span>${r.work}</div>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleCard(header) {
  const card = header.closest('.concert-card');
  const allCopies = document.querySelectorAll('.program-copy');
  const allChevs = document.querySelectorAll('.chevron');
  const idx = card.dataset.id;
  const copy = document.getElementById('copy-' + idx);
  const chev = document.getElementById('chev-' + idx);
  const isOpen = copy.classList.contains('open');
  allCopies.forEach(el => el.classList.remove('open'));
  allChevs.forEach(el => el.classList.remove('open'));
  if (!isOpen) {
    copy.classList.add('open');
    chev.classList.add('open');
  }
}

function filterConcerts(theme, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderConcerts(theme);
}

renderConcerts('all');
